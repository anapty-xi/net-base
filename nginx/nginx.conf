events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # DRY: Общие заголовки прокси на уровне http
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # DRY: Карта кэширования (валидный метод)
    map $uri $static_cache {
        default "no-cache";
        ~*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ "public, max-age=31536000, immutable";
    }

    # Сервер 1: Основной вход (Frontend + API Gateway)
    server {
        listen 80;
        server_name localhost;

        location /static/ {
            alias /var/html/static/ ;
            add_header Cache-Control $static_cache;
        }

        # Группировка API микросервисов
        location ~ ^/(user|db|analytics)/ {
            proxy_pass http://api-gateway:8000;
        }

        location / {
            proxy_pass http://frontend:8080;
        }
    }

    # Сервер 2: Прямой доступ к админке
    server {
        listen 8001;
        server_name localhost;

        location /static/ {
            alias /var/html/static/ ;
            add_header Cache-Control $static_cache;
        }

        location /admin/ {
            # Важно: указывай внутренний порт контейнера user-service
            proxy_pass http://user-service:8001; 
        }

        location = / {
            return 301 /admin/;
        }
    }
}